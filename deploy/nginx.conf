# Lenormand — 香港服务器 nginx 配置示例
# 用法：把 <你的域名> 换成实际域名；先用 HTTP 跑通，再用 certbot 自动加 HTTPS。
#   sudo certbot --nginx -d 你的域名
# certbot 会自动补全 443/ssl_certificate 等行。

server {
    listen 80;
    server_name 你的域名;              # 例如 lenormand.example.com

    # 静态站点根目录（把打包出的 dist/ 传到这里）
    root /var/www/lenormand/dist;
    index index.html;

    # .wasm / .task 的正确 MIME（手势识别依赖）
    types {
        application/wasm            wasm;
        application/octet-stream    task;
        font/woff2                  woff2;
    }

    # 大体积静态资源（模型 / wasm / 字体）长缓存
    location ~* \.(wasm|task|woff2|jpg|png|svg|mp3|wav)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # AI 解读接口：反代到本机 Node 服务；SSE 流式必须关闭缓冲
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_buffering off;           # 关键：否则流式解读会卡住不逐字出
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    # 前端是 SPA，其余路径都回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
