# Lenormand — 香港服务器 nginx 配置示例
# 用法：把 server_name 换成你的域名（暂时可用 _ 走 IP）；
# HTTPS 用 certbot 自动加：sudo certbot --nginx -d 你的域名

server {
    listen 80;
    server_name _;                    # 有域名后改成你的域名，再跑 certbot

    root /var/www/lenormand/dist;
    index index.html;

    # .wasm 需要正确 MIME（旧版 nginx 的 mime.types 里没有 wasm）
    # 注意：不要用整块 types{}，那会覆盖默认 mime.types 导致 html 变成下载
    location ~* \.wasm$ {
        default_type application/wasm;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 其它大静态资源长缓存（类型仍走全局 mime.types）
    location ~* \.(task|woff2|jpg|png|svg|mp3|wav)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # AI 解读接口：反代到本机 Node 服务；SSE 流式必须关闭缓冲
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_buffering off;           # 关键：否则流式解读会卡住不逐字出
        proxy_read_timeout 300s;
    }

    # SPA：其余路径回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
